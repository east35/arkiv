<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#09090b" />

        <link rel="icon" type="image/png" href="/favicon.png" />
        <link rel="apple-touch-icon" href="/favicon.png" />
        <link rel="manifest" href="/site.webmanifest" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Outfit:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <title>Arkiv</title>
        <meta
            name="description"
            content="Your personal library for books and games."
        />

        <!-- Open Graph / iMessage / SMS preview -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Arkiv" />
        <meta
            property="og:title"
            content="Arkiv — Track your books and games"
        />
        <meta
            property="og:description"
            content="Your personal library for books and games. Log progress, scores, and stats."
        />
        <meta property="og:image" content="https://arkive.dev/og-image.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:url" content="https://arkive.dev" />

        <!-- Twitter / fallback -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta
            name="twitter:title"
            content="Arkiv — Track your books and games"
        />
        <meta
            name="twitter:description"
            content="Your personal library for books and games."
        />
        <meta name="twitter:image" content="https://arkive.dev/og-image.png" />
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
